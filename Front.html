<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financiero - Importador de Datos</title>
    
    <!-- Librerías Externas (CDNs) -->
    <!-- React & DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plugin para etiquetas dentro de los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- PDF.js para lectura de archivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Tailwind CSS para estilos -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuración Worker PDF.js -->
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        Chart.register(ChartDataLabels); // Registrar el plugin de etiquetas globalmente
    </script>
    <style>
        /* Eliminar spinners de inputs numéricos */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }

        /* Input de monto: tipografía y baseline limpios */
        .amount-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(71,85,105,0.4);
            outline: none;
            text-align: right;
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
            color: #f1f5f9;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            padding: 2px 0 4px;
            transition: border-color 0.15s;
            letter-spacing: 0.01em;
        }
        .amount-input:focus { border-bottom-color: #60a5fa; }

        .qty-input {
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(71,85,105,0.3);
            border-radius: 4px;
            outline: none;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 500;
            width: 64px;
            padding: 3px 6px;
            transition: border-color 0.15s;
        }
        .qty-input:focus { border-color: #60a5fa; color: #e2e8f0; }

        .stat-card {
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(51,65,85,0.4);
            border-radius: 10px;
            padding: 14px 16px;
            transition: border-color 0.15s;
        }
        .stat-card:hover { border-color: rgba(71,85,105,0.7); }

        .section-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 10px;
        }

        /* Tooltip */
        .tooltip-trigger { position: relative; display: inline-flex; }
        .tooltip-box {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.7rem;
            line-height: 1.5;
            color: #94a3b8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 50;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .tooltip-trigger:hover .tooltip-box { opacity: 1; }
        .tooltip-trigger:hover .tooltip-box::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #334155;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.25s ease both; }
    </style>
</head>
<body class="bg-slate-900 text-slate-300 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        // ==========================================
        // UTILS: CAPA DE FORMATEO Y SEGURIDAD
        // ==========================================
        const Utils = {
            // Formateo de moneda ARS (Redondeo a entero por defecto para KPIs)
            fmt: (val, dec = 0) => {
                const num = parseFloat(val);
                if (isNaN(num)) return dec === 0 ? '$ 0' : '$ 0,00';
                return new Intl.NumberFormat('es-AR', { 
                    style: 'currency', 
                    currency: 'ARS', 
                    maximumFractionDigits: dec 
                }).format(num);
            },
            // Porcentaje seguro (evita división por cero)
            pct: (val, total) => total > 0 ? ((val / total) * 100).toFixed(1) : "0",
            // Acceso seguro a números
            num: (val) => {
                if (val === undefined || val === null || val === '') return 0;
                const n = parseFloat(val);
                // Validación estricta para finanzas
                if (!Number.isFinite(n)) {
                    console.warn("Fallo de integridad: Valor no numérico detectado ->", val);
                    return 0;
                }
                return isNaN(n) ? 0 : n;
            },
            // Acceso seguro a arrays
            arr: (arr) => Array.isArray(arr) ? arr : []
        };



        // ==========================================
        // COMPONENTES
        // ==========================================
        const App = () => {
            // URL de la Web App de Google Apps Script (Reemplazar con la real o usar input)
            const [apiUrl, setApiUrl] = useState(localStorage.getItem('gas_api_url') || ''); 
            const [urlInput, setUrlInput] = useState(apiUrl);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('carga'); // 'carga' | 'dashboard'
            const [refreshTrigger, setRefreshTrigger] = useState(0);
            const [previewData, setPreviewData] = useState(null);
            const [showProfessionalFeesModal, setShowProfessionalFeesModal] = useState(false);
            const [showStructuralModal, setShowStructuralModal] = useState(false);
            const [previewOrigen, setPreviewOrigen] = useState(null);
            
            // ESTADO DEL DASHBOARD (Agregado para corregir desconexión)
            const [dashData, setDashData] = useState(null);
            const [empData, setEmpData] = useState([]);
            const [arcaData, setArcaData] = useState([]);
            const [ventasData, setVentasData] = useState([]);
            const [dashLoading, setDashLoading] = useState(!!apiUrl); // Si hay URL, empezamos cargando
            const [dashError, setDashError] = useState(null);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth() + 1).padStart(2, '0'));
            const [availablePeriods, setAvailablePeriods] = useState([]); // Lista de YYYY-MM con datos
            // Estado para la fecha de imputación manual (Default: Hoy)
            const [defaultDate, setDefaultDate] = useState(new Date().toISOString().slice(0, 10));
            // ESTADO DE CARGAS SOCIALES (Elevado para impactar Dashboard)
            const [cargasPct, setCargasPct] = useState(() => localStorage.getItem('cfg_cargas_pct') || "0");

            useEffect(() => {
                localStorage.setItem('cfg_cargas_pct', cargasPct);
            }, [cargasPct]);

            const months = [
                { v: '01', l: 'Ene' }, { v: '02', l: 'Feb' }, { v: '03', l: 'Mar' },
                { v: '04', l: 'Abr' }, { v: '05', l: 'May' }, { v: '06', l: 'Jun' },
                { v: '07', l: 'Jul' }, { v: '08', l: 'Ago' }, { v: '09', l: 'Sep' },
                { v: '10', l: 'Oct' }, { v: '11', l: 'Nov' }, { v: '12', l: 'Dic' }
            ];

            // Cargar Metadatos (Periodos)
            useEffect(() => {
                if (!apiUrl || activeTab === 'carga') return;
                const loadMeta = async () => {
                    try {
                        const res = await fetch(`${apiUrl}?action=GET_METADATA`);
                        const meta = await res.json();
                        
                        // Actualizamos qué periodos tienen datos reales
                        if (meta.periods) {
                            setAvailablePeriods(meta.periods);
                        }
                    } catch (e) { setDashError("Error cargando periodos: " + e.message); }
                };
                // Recargar metadata cada vez que entramos al dashboard o actualizamos datos
                loadMeta();
            }, [apiUrl, activeTab, refreshTrigger]);

            // Efecto: Cargar Datos solo al cambiar periodo o refresco manual
            useEffect(() => {
                if (!apiUrl || !selectedMonth || activeTab === 'carga') return;
                
                // Evitar fetch si los datos que ya tenemos coinciden con el periodo seleccionado
                const currentPeriodInDash = dashData?.periodo; // Formato: "YYYY-MM-DD al YYYY-MM-DD"
                const isAlreadyLoaded = currentPeriodInDash && currentPeriodInDash.includes(`${selectedYear}-${selectedMonth}`);

                if (!isAlreadyLoaded || refreshTrigger > 0) {
                fetchData(refreshTrigger > 0);
                }
            }, [selectedMonth, selectedYear, refreshTrigger, apiUrl, activeTab]);

            const fetchData = async (force = false) => {
                if (!apiUrl) return;
                
                const isNewPeriod = !dashData?.periodo?.includes(`${selectedYear}-${selectedMonth}`);
                
                // Incluimos el hash de la URL para evitar conflictos si cambias de script
                const urlHash = btoa(apiUrl || '').substring(0, 8);
                const cacheKey = `cache_${urlHash}_${selectedYear}_${selectedMonth}`;
                
                // 1. INTENTO DE CACHÉ (Antes de activar estados de carga)
                if (!force) {
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) {
                        try {
                            const parsed = JSON.parse(cached);
                            setDashData(parsed.dash);
                            setEmpData(parsed.emp);
                            setArcaData(parsed.arca);
                            setVentasData(parsed.ventas);
                            setDashError(null);
                            setDashLoading(false);
                            addLog(`📦 Datos recuperados de caché local (${selectedYear}-${selectedMonth}).`);
                            return; // Salida temprana: evitamos tocar el servidor
                        } catch (e) {
                            localStorage.removeItem(cacheKey);
                        }
                    }
                }

                // 2. CARGA REAL (Si no hay caché o es forzado)
                if (isNewPeriod || force) {
                    setDashData(null); 
                }
                setDashLoading(true);
                setDashError(null);
                try {
                    const start = `${selectedYear}-${selectedMonth}-01`;
                    const lastDay = new Date(selectedYear, parseInt(selectedMonth), 0).getDate();
                    const end = `${selectedYear}-${selectedMonth}-${lastDay}`;
                    
                    // Consolidación en una sola petición para ahorrar gas de Apps Script
                    const response = await fetch(`${apiUrl}?action=GET_COMPLETE_DATA&start=${start}&end=${end}`);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    const result = await response.json();
                    if (result.error) throw new Error(result.error);

                    // Actualizamos todos los estados con un solo objeto de respuesta
                    setDashData(result.dashboard);
                    setEmpData(result.employees || []);
                    setArcaData(result.arca || []);
                    setVentasData(result.ventas || []);

                    // Guardar en caché el objeto consolidado
                    const toCache = { dash: result.dashboard, emp: result.employees, arca: result.arca, ventas: result.ventas };
                    localStorage.setItem(cacheKey, JSON.stringify(toCache));
                } catch (e) { setDashData(null); setDashError(e.message); }
                finally { setDashLoading(false); }
            };

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [`[${time}] ${msg}`, ...prev]);
            };

            const handleClearCache = () => {
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('cache_')) localStorage.removeItem(key);
                });
                addLog('🧹 Caché de datos vaciada.', 'warning');
                fetchData(true);
            };

            const handleSaveUrl = () => {
                localStorage.setItem('gas_api_url', urlInput);
                setApiUrl(urlInput);
                addLog('✅ URL de implementación guardada localmente.', 'success');
            };

            const sendToBackend = async (data, origen) => {
                if (!apiUrl) {
                    alert('Por favor configura la URL de la API primero.');
                    return;
                }
                if (data.length === 0) {
                    alert('No hay datos válidos para enviar.');
                    return;
                }

                setLoading(true);
                addLog(`Enviando ${data.length} registros de ${origen}...`);

                const payload = {
                    action: 'CARGAR_DATOS',
                    origen: origen,
                    payload: data
                };

                // Validar URL básica antes de enviar
                if (!apiUrl.startsWith('https://script.google.com')) {
                    addLog(`❌ Error: La URL no parece ser un endpoint válido de Google Apps Script.`, 'error');
                    setLoading(false); return;
                }

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Evita pre-flight CORS en GAS
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Error de red: HTTP ${response.status}`);
                    }
                    
                    const result = await response.json();
                    if (result.status === 'OK') {
                        addLog(`✅ Éxito: ${result.insertados} insertados, ${result.omitidos} duplicados.`, 'success');
                        setRefreshTrigger(prev => prev + 1); // Actualizar Dashboard
                        setActiveTab('dashboard'); // Cambiar a pestaña dashboard automáticamente
                    } else {
                        addLog(`❌ Error Backend: ${result.message}`, 'error');
                    }
                } catch (error) {
                    addLog(`❌ Error de Envío: ${error.message}. Verifica la conexión y que la URL de la API sea correcta.`, 'error');
                } finally {
                    setLoading(false);
                }
            };

            // Helper para resaltar visualmente el sufijo de la implementación
            const UrlFingerprint = ({ url }) => {
                if (!url || url.length < 8) return null;
                const mainPart = url.substring(0, url.length - 4);
                const suffix = url.substring(url.length - 4);
                return (
                    <div className="flex items-center gap-1 mt-2 p-2 bg-slate-900/50 rounded border border-slate-700/30 overflow-hidden">
                        <span className="text-[10px] text-slate-600 font-mono truncate">{mainPart}</span>
                        <span className="flex items-center">
                            <span className="bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded-l border border-amber-500/30 font-black font-mono text-xs">
                                {suffix}
                            </span>
                        </span>
                    </div>
                );
            };

            const handleDataReady = (data, origen) => {
                setPreviewData(data);
                setPreviewOrigen(origen);
            };

            const handleCellEdit = (index, key, value) => {
                // Validación de seguridad para evitar NaNs en el estado
                const parsed = parseFloat(value);
                const numValue = value === '' || isNaN(parsed) ? 0 : parsed;
                const updatedData = previewData.map((r, i) => {
                    if (i !== index) return r;
                    const updated = {
                        ...r,
                        [key]: (typeof r[key] === 'number') ? numValue : value
                    };

                    // LOGICA ESPECIFICA MAXIREST: Recalcular totales al editar componentes
                    if (previewOrigen === 'MAXIREST' && key.startsWith('val_')) {
                        // 1. Recalculo Fiscal
                        updated.neto = updated.val_neto_acf;
                        updated.iva = updated.val_iva_acf;
                        updated.total = updated.neto + updated.iva;

                        // 2. Recalculo Observaciones (String dinámico)
                        const obsParts = [];
                        if (updated.val_cantidad) obsParts.push(`Q:${updated.val_cantidad}`);
                        if (updated.val_turno_am || updated.val_turno_pm) obsParts.push(`AM:$${updated.val_turno_am}/PM:$${updated.val_turno_pm}`);
                        if (updated.val_efectivo || updated.val_tarjetas || updated.val_otros) obsParts.push(`Efvo:$${updated.val_efectivo}/Tarj:$${updated.val_tarjetas}`);
                        if (updated.val_mostrador || updated.val_salon) obsParts.push(`Most:$${updated.val_mostrador}/Sal:$${updated.val_salon}`);
                        if (updated.val_anulaciones) obsParts.push(`Anul:$${updated.val_anulaciones}`);

                        updated.observaciones = obsParts.join('. ');
                    }

                    return updated;
                });
                setPreviewData(updatedData);
            };

            // Función para corrección masiva de fecha en la tabla de previsualización
            const applyDateToAll = (newDate) => {
                if (!previewData) return;
                // Detectar nombre del campo según origen
                let dateField = 'fecha';
                if (previewOrigen === 'SUELDOS') dateField = 'fecha_periodo';

                const updated = previewData.map(r => ({ ...r, [dateField]: newDate }));
                setPreviewData(updated);
            };

            const confirmUpload = () => {
                // REDIRECCION: Si el origen es MAXIREST, lo enviamos como 'MAXIREST_RESUMEN'
                // para asegurar que se guarde en la hoja principal que lee el Dashboard,
                // evitando que se cree una hoja separada 'Resumen Maxirest'.
                const origenFinal = previewOrigen === 'MAXIREST' ? 'MAXIREST_RESUMEN' : previewOrigen;
                
                sendToBackend(previewData, origenFinal);
                setPreviewData(null);
                setPreviewOrigen(null);
            };

            const StatCard = ({ label, valueKey, qtyKey, index, accent = '#64748b' }) => {
                const val = previewData[index][valueKey];
                const qty = qtyKey !== undefined ? previewData[index][qtyKey] : undefined;
                return (
                    <div className="stat-card flex flex-col gap-2">
                        <span className="section-label" style={{ color: accent }}>{label}</span>
                        <div className="flex items-baseline gap-1">
                            <span className="text-slate-500 text-sm font-mono">$</span>
                            <input
                                type="number"
                                value={val}
                                onChange={(e) => handleCellEdit(index, valueKey, e.target.value)}
                                className="amount-input"
                            />
                        </div>
                        {qtyKey !== undefined && (
                            <div className="flex items-center justify-end gap-2 mt-1">
                                <span className="text-slate-600 text-[10px] uppercase tracking-wider">Ops</span>
                                <input
                                    type="number"
                                    value={qty}
                                    onChange={(e) => handleCellEdit(index, qtyKey, e.target.value)}
                                    className="qty-input"
                                />
                            </div>
                        )}
                    </div>
                );
            };

            const DateField = ({ index }) => (
                <div className="stat-card flex items-center justify-between">
                    <span className="section-label text-slate-500" style={{marginBottom:0}}>Fecha del Cierre</span>
                    <input
                        type="date"
                        value={previewData[index]['fecha']}
                        onChange={(e) => handleCellEdit(index, 'fecha', e.target.value)}
                        className="bg-transparent border-b border-slate-700/40 focus:border-blue-400 outline-none text-slate-200 text-sm font-mono py-1 transition"
                    />
                </div>
            );

            const periodButtons = React.useMemo(() => {
                const periods = [];
                const now = new Date();
                for (let i = 8; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    periods.push({
                        y: String(d.getFullYear()),
                        m: String(d.getMonth() + 1).padStart(2, '0'),
                        label: d.toLocaleDateString('es-AR', { month: 'short' }).replace('.', ''),
                        yearShort: d.toLocaleDateString('es-AR', { year: '2-digit' })
                    });
                }
                return periods;
            }, []);

            return (
                <div className="max-w-4xl mx-auto py-10 px-4">
                    <header className="mb-10 text-center">
                        <h1 className="text-3xl font-extrabold text-slate-100 mb-2">Importador Financiero</h1>
                        <p className="text-slate-400">Gestión de Ventas (Maxirest) y Compras (ARCA)</p>
                    </header>

                    {/* Configuración API */}
                    <div className="mb-8 bg-slate-800 p-4 rounded-lg shadow-lg border border-slate-700">
                        <div className="flex items-center justify-between mb-2">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">ID de Despliegue (Google Apps Script)</label>
                            {apiUrl && (
                                <span className="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-full border border-emerald-500/20 font-bold uppercase">Vinculado</span>
                            )}
                        </div>
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                className="flex-1 p-2.5 bg-slate-700 border border-slate-600 rounded-lg text-sm font-mono text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                placeholder="Ingresa el ID del Script (ej: AKfycb...)"
                                value={urlInput}
                                onChange={(e) => setUrlInput(e.target.value)}
                            />
                            <button 
                                onClick={handleSaveUrl}
                                className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2 shadow-lg shadow-blue-900/20"
                                title="Guardar URL en este navegador"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                                Guardar Localmente
                            </button>
                        </div>
                    </div>

                    {/* NAVEGACIÓN NIVEL 1: SEPARADOR PRINCIPAL */}
                    <div className="flex items-center justify-center gap-4 mb-10 bg-slate-800/20 p-2.5 rounded-[1.8rem] border border-slate-800/60 shadow-inner">
                        <button 
                            onClick={() => { setActiveTab('carga'); setPreviewData(null); }}
                            className={`flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase tracking-[0.25em] transition-all duration-300 ${activeTab === 'carga' ? 'bg-emerald-600 text-white shadow-xl shadow-emerald-900/30' : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-300'}`}
                        >
                            📥 Gestión de Carga
                        </button>
                        <div className="w-px h-6 bg-slate-700/50"></div>
                        <button 
                            onClick={() => setActiveTab('dashboard')}
                            className={`flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase tracking-[0.25em] transition-all duration-300 ${activeTab !== 'carga' ? 'bg-blue-600 text-white shadow-xl shadow-blue-900/30' : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-300'}`}
                        >
                            📊 Análisis de Resultados
                        </button>
                    </div>

                    {/* NAVEGACIÓN NIVEL 2: SUB-PESTAÑAS DE ORIGEN (Solo en Resultados) */}
                    {activeTab !== 'carga' && (
                        <div className="flex items-center border-b border-slate-800 mb-8 overflow-x-auto whitespace-nowrap scrollbar-hide gap-1 animate-fade-in justify-center">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className={`pb-3 px-4 text-[9px] font-black uppercase tracking-widest transition-all ${activeTab === 'dashboard' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                📈 Dashboard
                            </button>
                            <button 
                                onClick={() => setActiveTab('empleados')}
                                className={`pb-3 px-4 text-[9px] font-black uppercase tracking-widest transition-all ${activeTab === 'empleados' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                Nómina
                            </button>

                        {logs.length === 0 && <span className="text-slate-600">Esperando acciones...</span>}
                        {logs.map((log, i) => (
                            <div key={i} className={`mb-1 ${log.includes('❌') ? 'text-red-400' : log.includes('✅') ? 'text-green-400' : 'text-slate-300'}`}>
                                {log}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
